# coturn TURN server configuration
# Reference: https://github.com/coturn/coturn/wiki/turnserver

# Listening ports
listening-port=3478
tls-listening-port=5349

# Replace with your server's public IP
external-ip=YOUR_SERVER_PUBLIC_IP

# Use HMAC token-based short-term credentials (compatible with WebRTC)
use-auth-secret
static-auth-secret=change-me-strong-secret

# Realm (your domain or server name)
realm=desktopshare.example.com

# Log
log-file=/var/log/coturn/coturn.log
verbose

# Security
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255

# TLS certificate (for port 5349)
# cert=/etc/letsencrypt/live/desktopshare.example.com/fullchain.pem
# pkey=/etc/letsencrypt/live/desktopshare.example.com/privkey.pem
