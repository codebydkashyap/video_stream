version: '3.9'

services:
  # ── Signaling Server ───────────────────────────────────────────────────
  signaling:
    build:
      context: ../server/signaling
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', r => process.exit(r.statusCode !== 200 ? 1 : 0))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── coturn TURN Server ─────────────────────────────────────────────────
  turn:
    image: coturn/coturn:latest
    network_mode: "host"  # Required for UDP to work correctly
    volumes:
      - ./coturn.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped
